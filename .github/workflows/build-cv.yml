name: Build CV PDF

on:
  push:
    branches: [main]
    paths:
      - 'cv.tex'
      - 'altacv.cls'
      - '.github/workflows/build-cv.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile CV
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex
          latexmk_use_xelatex: false
          args: -pdf -file-line-error -halt-on-error -interaction=nonstopmode

      - name: Rename generated PDF
        run: |
          mv cv.pdf Lenin_Quezada_CV.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lenin_Quezada_CV
          path: Lenin_Quezada_CV.pdf

      - name: Commit updated PDF
        run: |
          if git diff --quiet -- Lenin_Quezada_CV.pdf; then
            echo "No PDF changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Lenin_Quezada_CV.pdf
          git commit -m "Auto-update CV PDF"
          git push
